services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: govcrawler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: govcrawler
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./wal_archive:/wal_archive
    # WAL archiving (Phase 6, plan.md §19) — tightens RPO below backup.sh's
    # daily pg_dump (deploy/BACKUP.md), enabling point-in-time recovery per
    # deploy/PITR.md. Filesystem-based, same "back this up offsite too"
    # caveat as ./backups already carries.
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - wal_level=replica
      - -c
      - "archive_command=test ! -f /wal_archive/%f && cp %p /wal_archive/%f"
    # No host-side port mapping — db is only reachable over the internal
    # compose network (by migrate, api, dispatcher).  If you need to run
    # scripts/migrate_sqlite_to_pg.py from the host, temporarily add:
    #   ports: ["127.0.0.1:5433:5432"]
    # and remove it again when done.
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U govcrawler" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
      GOVCRAWLER_APP_PASSWORD: ${GOVCRAWLER_APP_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_APP: ${DATABASE_URL_APP}
      JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET_PREV: ${JWT_SECRET_PREV:-}
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
      CREDENTIAL_ENC_KEY_PREV: ${CREDENTIAL_ENC_KEY_PREV:-}
      DISPATCH_MODE: external
      COOKIE_SECURE: "true"
      # Must be 0.0.0.0 so uvicorn binds all interfaces — 127.0.0.1 (the dev
      # default) is loopback-only and Caddy can't reach it over Docker's network.
      API_HOST: "0.0.0.0"
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-https://${DOMAIN}}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-https://${DOMAIN}}
      OAUTH_MS_CLIENT_ID: ${OAUTH_MS_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    expose:
      - "8001"
    # No host-side port mapping — the proxy service is the only entry point.
    # For local dev/test on the same machine as the server, temporarily add:
    #   ports: ["127.0.0.1:18001:8001"]
    # (use 18001 to avoid colliding with the agent BFF on 8001).
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')" ]
      interval: 15s
      timeout: 5s
      retries: 5

  dispatcher:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m cloud.dispatch_service
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_APP: ${DATABASE_URL_APP}
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
      CREDENTIAL_ENC_KEY_PREV: ${CREDENTIAL_ENC_KEY_PREV:-}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-https://${DOMAIN}}
      OAUTH_MS_CLIENT_ID: ${OAUTH_MS_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  proxy:
    image: caddy:2
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata: { }
  caddy_data: { }
